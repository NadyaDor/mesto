<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesto</title>
    <link rel="stylesheet" href="pages/index.css">
    <script src="scripts/elements.js" defer></script>
    <script src="scripts/index.js" defer></script>
  </head>

  <body class="page">
    <header class="header">
      <img class="header__logo" src="images/Logo.svg" alt="Логотип текущего проекта">
    </header>

    <main>
      <section class="profile">
        <img class="profile__avatar" src="images/Avatarka.jpg" alt="Аватарка хорошего человека">
        <div class="profile__info">
          <h1 class="profile__name">Жак-Ив Кусто и его подруга</h1>
          <button class="profile__edit-button" type="button" value="Редактировать"></button>
          <p class="profile__about">Исследователь океана и воздуха над океаном</p>
        </div>
        <button class="profile__add-button" type="button"></button>
      </section>

      <section class="elements">
      </section>
    </main>

    <footer class="footer">
      <p lang="en" class="footer__text">© 2020 Mesto Russia</p>
    </footer>

    <!-- ВСПЛЫВАЮЩИЕ ОКНА -->
    <section class="popup popup_profile">
      <div class="popup__container">
        <button class="popup__close popup__close_profile" type="button"></button>
        <h2 class="popup__title">Редактировать профиль</h2>
        <form class="popup__form popup__form_profile">
          <input class="popup__name-input popup__name-input_type_name" type="text" placeholder="Введите ваше имя" name="name"/>
          <input class="popup__name-input popup__name-input_type_about" type="text" placeholder="Введите ваш статус" name="about"/>
          <button class="popup__button-edit" type="submit">Сохранить</button>
        </form>
      </div>
    </section>

    <section class="popup popup_element">
      <div class="popup__container">
        <button class="popup__close popup__close_element" type="button"></button>
        <h2 class="popup__title">Новое место</h2>
        <form class="popup__form popup__form_element">
          <input class="popup__name-input popup__name-input_type_place" type="text" placeholder="Название" name="name"/>
          <input class="popup__name-input popup__name-input_type_link" type="text" placeholder="Ссылка на картинку" name="link"/>
          <button class="popup__button-edit" type="submit">Создать</button>
        </form>
      </div>
    </section>

    <section class="popup popup-mesto">
      <div class="popup-mesto__container">
        <button class="popup__close popup__close_mesto"></button>
        <img class="popup-mesto__mask" src="#" alt="#">
        <p class="popup-mesto__name"></p>
      </div>
    </section>

    <template id="element-template">
      <div class="element">
        <img class="element__mask" src="images/Samui.jpg" alt="где-то на острове Самуи">
        <div class="element__basket"></div>
        <div class="element__about">
          <h2 class="element__place">Самуи</h2>
          <button class="element__hurt" type="button"></button>
        </div>
      </div>
    </template>
  </body>
</html>
