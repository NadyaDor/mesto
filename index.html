<!DOCTYPE html>
<html>
  <head lang="ru">
    <meta charset="=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesto</title>
    <link rel="stylesheet" href="pages/index.css">
  </head>
  <body class="page">
    <header class="header">
      <img class="header__logo" src="images/Logo.svg" alt="Логотип">
      <img class="header__line" src="images/Line.svg" alt="Линия">
    </header>
    <main>
      <section class="profile">
        <img class="profile__avatar" src="images/Jack_Iv.svg" alt="Фото Жака">
        <div class="profile__info">
          <h1 class="profile__name">Жак-Ив Кусто</h1>
          <button class="profile__edit-button" type="button" value="Редактировать">
            <img class="profile__edit-button-photo" src="images/Vector_pen.svg" alt="Редактировать">
          </button>
          <p class="profile__about">Исследователь океана</p>
        </div>
        <button class="profile__add-button"><img class="profile__add-button-photo" src="images/Vector_plus.svg" alt="Добавить"></button>
      </section>
      <ul class="elements">
        <li class="element">
          <img class="element__mask" src="images/Karachaevsk.png" alt="Карачаевск">
          <div class="element__about">
            <h2 class="element__place">Карачаевск</h2>
            <button class="element__hurt"></button>
          </div>
        </li>
        <li class="element">
          <img class="element__mask" src="images/Elbrus.png" alt="Эльбрус">
          <div class="element__about">
            <h2 class="element__place">Гора Эльбрус</h2>
            <button class="element__hurt"></button>
          </div>
        </li>
        <li class="element">
          <img class="element__mask" src="images/Dombye.svg" alt="Домбай">
          <div class="element__about">
            <h2 class="element__place">Домбай</h2>
            <button class="element__hurt"></button>
          </div>
        </li>
        <li class="element">
          <img class="element__mask" src="images/Elbrus.png" alt="Эльбрус">
          <div class="element__about">
            <h2 class="element__place">Гора Эльбрус</h2>
            <button class="element__hurt"></button>
          </div>
        </li>
        <li class="element">
          <img class="element__mask" src="images/Dombye.svg" alt="Домбай">
          <div class="element__about">
            <h2 class="element__place">Домбай</h2>
            <button class="element__hurt"></button>
          </div>
        </li>
        <li class="element">
          <img class="element__mask" src="images/Karachaevsk.png" alt="Карачаевск">
          <div class="element__about">
            <h2 class="element__place">Карачаево-Ч...</h2>
            <button class="element__hurt"></button>
          </div>
        </li>
      </ul>
      <!-- ВСПЛЫВАЮЩЕЕ ОКНО -->
      <section class="popup popup_edit-button">
        <div class="popup__content">
          <button class="popup__close popup__close_edit-button"><img class="popup__close-img" src="images/Vector_close.svg" alt="Закрыть"></button>
          <form class="popup__form">
            <h2 class="popup__title">Редактировать профиль</h2>
            <input class="popup__name-input popup__name-input_type" name="name"/>
            <img class="popup__line">
            <input class="popup__name-about popup__name-about_input" about="about"/>
            <img class="popup__line">
            <button class="popup__button-edit" type="submit">Сохранить</button>
          </form>
        </div>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__text">© 2020 Mesto Russia</p>
    </footer>
    <script src="index.js"></script>
  </body>
</html>
