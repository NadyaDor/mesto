<!DOCTYPE html>
<html lang="ru" lang="en" >
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesto</title>
    <link rel="stylesheet" href="pages/index.css">
  </head>
  <body class="page">
    <header class="header">
      <img class="header__logo" src="images/Logo.svg" alt="Логотип текущего проекта">
    </header>
    <main>
      <section class="profile">
        <img class="profile__avatar" src="images/Avatarka.jpg" alt="Аватарка хорошего человека">
        <div class="profile__info">
          <h1 class="profile__name">Жак-Ив Кусто и его подруга</h1>
          <button class="profile__edit-button" type="button" value="Редактировать"></button>
          <p class="profile__about">Исследователь океана и воздуха над океаном</p>
        </div>
        <button class="profile__add-button"></button>
      </section>
      <section class="elements">
        <div class="element">
          <img class="element__mask" src="images/Samui.jpg" alt="где-то на острове Самуи">
          <div class="element__about">
            <h2 class="element__place">Самуи</h2>
            <button class="element__hurt"></button>
          </div>
        </div>
        <div class="element">
          <img class="element__mask" src="images/Brussel.jpg" alt="а здесь изображен кусочек Брюсселя">
          <div class="element__about">
            <h2 class="element__place">Брюссель</h2>
            <button class="element__hurt"></button>
          </div>
        </div>
        <div class="element">
          <img class="element__mask" src="images/Kaliningrad.jpg" alt="Калининград очень красивый, но вы по какой-то причине этого не увидите">
          <div class="element__about">
            <h2 class="element__place">Калининград</h2>
            <button class="element__hurt"></button>
          </div>
        </div>
        <div class="element">
          <img class="element__mask" src="images/Samarkand.jpg" alt="Самарканд - очень старый город">
          <div class="element__about">
            <h2 class="element__place">Самарканд</h2>
            <button class="element__hurt"></button>
          </div>
        </div>
        <div class="element">
          <img class="element__mask" src="images/Yalta.jpg" alt="Ялта - город счастья">
          <div class="element__about">
            <h2 class="element__place">Ялта - город счастья</h2>
            <button class="element__hurt"></button>
          </div>
        </div>
        <div class="element">
          <img class="element__mask" src="images/Tashkent.jpg" alt="В Ташкенте жарко даже в декабре">
          <div class="element__about">
            <h2 class="element__place">Ташкент</h2>
            <button class="element__hurt"></button>
          </div>
        </div>
      </section>
      <!-- ВСПЛЫВАЮЩЕЕ ОКНО -->
      <section class="popup">
        <div class="popup__container">
          <button class="popup__close"></button>
          <h2 class="popup__title">Редактировать профиль</h2>
          <form class="popup__form">
            <input class="popup__name-input popup__name-input_name" type="text" placeholder="Введите ваше имя" name="name"/>
            <input class="popup__name-input popup__name-input_about" type="text" placeholder="Введите ваш статус" about="about"/>
            <button class="popup__button-edit" type="submit">Сохранить</button>
          </form>
        </div>
      </section>
    </main>
    <footer class="footer">
      <p class="footer__text">© 2020 Mesto Russia</p>
    </footer>
    <script src="/scripts/index.js"></script>
  </body>
</html>
