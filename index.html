<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesto</title>
    <link rel="stylesheet" href="pages/index.css">
  </head>

  <body class="page">
    <header class="header">
      <img class="header__logo" src="images/Logo.svg" alt="Логотип текущего проекта">
    </header>

    <main>
      <section class="profile">
        <img class="profile__avatar" src="images/Avatarka.jpg" alt="Аватарка хорошего человека">
        <div class="profile__info">
          <h1 class="profile__name">Жак-Ив Кусто и его подруга</h1>
          <button class="profile__edit-button" type="button" value="Редактировать"></button>
          <p class="profile__about">Исследователь океана и воздуха над океаном</p>
        </div>
        <button class="profile__add-button" type="button"></button>
      </section>

      <section class="cards">
      </section>
    </main>

    <footer class="footer">
      <p lang="en" class="footer__text">© 2020 Mesto Russia</p>
    </footer>

    <!-- ВСПЛЫВАЮЩИЕ ОКНА -->
    <section class="popup popup_profile">
      <div class="popup__container">
        <button class="popup__close" type="button"></button>
        <h2 class="popup__title">Редактировать профиль</h2>
        <form class="popup__form popup__form_profile" name="form" novalidate>
          <input class="popup__input popup__input_type_name" type="text" minlength="2" maxlength="40" placeholder="Введите ваше имя" name="name" required/>
          <span class="popup__input-error"></span>
          <input class="popup__input popup__input_type_about" type="text" minlength="2" maxlength="200" placeholder="Введите ваш статус" name="about" required/>
          <span class="popup__input-error"></span>
          <button class="popup__button-edit" type="submit" disabled="true">Сохранить</button>
        </form>
      </div>
    </section>

    <section class="popup popup_card">
      <div class="popup__container">
        <button class="popup__close" type="button"></button>
        <h2 class="popup__title">Новое место</h2>
        <form class="popup__form popup__form_card" name="form" novalidate>
          <input class="popup__input popup__input_type_place" type="text" minlength="2" maxlength="30" placeholder="Название" name="name"required/>
          <span class="popup__input-error"></span>
          <input class="popup__input popup__input_type_link" type="url" placeholder="Ссылка на картинку" name="link" required/>
          <span class="popup__input-error"></span>
          <button class="popup__button-edit" type="submit" disabled="true">Создать</button>
        </form>
      </div>
    </section>

    <section class="popup popup-mesto">
      <div class="popup-container">
        <button class="popup__close" type="button"></button>
        <img class="popup-mesto__mask" src="#" alt="#">
        <p class="popup-mesto__name"></p>
      </div>
    </section>

    <template id="card-template">
      <div class="card">
        <img class="card__mask" src="images/Samui.jpg" alt="где-то на острове Самуи">
        <div class="card__basket"></div>
        <div class="card__about">
          <h2 class="card__place">Самуи</h2>
          <button class="card__hurt" type="button"></button>
        </div>
      </div>
    </template>
    <script src="scripts/cards.js" defer></script>
    <script src="scripts/validate.js" type="module" defer></script>
    <script src="scripts/index.js" type="module" defer></script>
  </body>
</html>
